<div class="auth-wrapper d-flex align-items-center justify-content-center py-5">
  <div class="container">
    <div class="row">
      <div class="col-lg-5 col-md-8 mx-auto">
        <div class="glass-card auth-card p-4 p-md-5">
          <div class="text-center mb-4">
            <i class="bi bi-building-lock text-warning fs-1"></i>
            <h2 class="text-white fw-bold mt-2">Welcome Back</h2>
            <p class="text-secondary">Sign in to track your redevelopment progress</p>
          </div>

          <div *ngIf="error" class="alert alert-danger border-0 bg-danger-subtle text-danger mb-4" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i> {{ error }}
          </div>

          <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
            <!-- Email Input -->
            <div class="mb-4">
              <mat-form-field appearance="outline" class="w-100 dark-form-field">
                <mat-label>Email Address</mat-label>
                <input matInput type="email" formControlName="email" placeholder="name@dreams.com">
                <mat-icon matSuffix class="text-secondary">email</mat-icon>
                <mat-error *ngIf="f['email'].errors?.['required']">Email is required</mat-error>
                <mat-error *ngIf="f['email'].errors?.['email']">Please enter a valid email</mat-error>
              </mat-form-field>
            </div>

            <!-- Password Input -->
            <div class="mb-3">
              <mat-form-field appearance="outline" class="w-100 dark-form-field">
                <mat-label>Password</mat-label>
                <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password" placeholder="••••••••">
                <button type="button" matSuffix mat-icon-button (click)="hidePassword = !hidePassword" [attr.aria-label]="'Hide password'" [attr.aria-checked]="hidePassword">
                  <mat-icon class="text-secondary">{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
                </button>
                <mat-error *ngIf="f['password'].errors?.['required']">Password is required</mat-error>
                <mat-error *ngIf="f['password'].errors?.['minlength']">Password must be at least 6 characters</mat-error>
              </mat-form-field>
            </div>

            <!-- Remember me & Forgot Pass -->
            <div class="d-flex justify-content-between align-items-center mb-4">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="rememberMe">
                <label class="form-check-label text-secondary" for="rememberMe">
                  Remember me
                </label>
              </div>
              <a href="#" class="text-warning text-decoration-none small">Forgot Password?</a>
            </div>

            <!-- Submit Button -->
            <button type="submit" [disabled]="loading" class="btn btn-gold w-100 py-3 mb-4">
              <span *ngIf="loading" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
              {{ loading ? 'Signing In...' : 'Sign In' }}
            </button>
          </form>

          <!-- Quick Select Demo Sign In -->
          <div class="demo-logins border-top border-secondary pt-4 text-center">
            <p class="text-secondary small fw-bold mb-3 uppercase-tracking">Developer Simulation Roles</p>
            <div class="d-grid gap-2">
              <button class="btn btn-sm btn-outline-gold" (click)="loginAs('admin')">
                <i class="bi bi-shield-lock-fill me-2"></i> Log in as Admin
              </button>
              <button class="btn btn-sm btn-outline-gold" (click)="loginAs('owner')">
                <i class="bi bi-house-fill me-2"></i> Log in as Property Owner
              </button>
              <button class="btn btn-sm btn-outline-gold" (click)="loginAs('renter')">
                <i class="bi bi-people-fill me-2"></i> Log in as Renter / Tenant
              </button>
            </div>
          </div>

          <div class="text-center mt-4">
            <p class="text-secondary m-0">
              Don't have an account? <a routerLink="/signup" class="text-warning text-decoration-none fw-bold">Sign Up</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
